#============================================================================================
# https://github.com/ophub/amlogic-s9xxx-openwrt
# Description: Build OpenWrt (Modified & Fixed Version)
#============================================================================================

name: 通用设备编译固件 (修正版)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "选择源码仓库"
        required: false
        default: "immortalwrt-master"
        type: choice
        options:
          - openwrt-main
          - lede-master
          - immortalwrt-master
          - Lienol-master
      source_version:
        description: "指定版本 (Tag/Commit, 留空则拉取最新)"
        required: false
        default: ""
      upload_release:
        description: "是否发布到 Releases"
        required: false
        default: "true"
        type: boolean

env:
  FEEDS_CONF: config/${{ inputs.source_branch }}/feeds.conf.default
  CONFIG_FILE: config/${{ inputs.source_branch }}/config
  DIY_P1_SH: config/${{ inputs.source_branch }}/diy-part1.sh
  DIY_P2_SH: config/${{ inputs.source_branch }}/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: ${{ inputs.upload_release }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}

    steps:
      # ==============================================
      # ✅ 正确位置：在检出代码之前先扩容磁盘
      # 这样不会清空你的仓库文件，也能让后续所有目录都享受到扩容
      # ==============================================
      - name: 最大化构建磁盘空间 (Fix Disk Full)
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-rust: 'true'
          remove-nodejs: 'true'
          remove-phantomjs: 'true'

      - name: 检出当前仓库代码 (Checkout)
        uses: actions/checkout@v4

      - name: 初始化编译环境 (Initialization)
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "正在清理磁盘空间..."
          docker rmi `docker images -q` 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null || true
          
          echo "正在安装依赖..."
          sudo -E apt-get -qq update
          sudo -E apt-get -qq purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          
          sudo -E systemctl daemon-reload
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          
          echo "正在配置工作目录..."
          sudo mkdir -p /workdir
          sudo chown ${USER}:${GROUPS} /workdir
          sudo timedatectl set-timezone "${TZ}"
          
          echo "status=success" >> ${GITHUB_OUTPUT}
          df -hT

      - name: 克隆 OpenWrt 源码 (Clone Source Code)
        id: codes
        working-directory: /workdir
        if: ${{ steps.init.outputs.status }} == 'success' && !cancelled()
        run: |
          if [[ "${{ inputs.source_branch }}" == *"openwrt"* ]]; then
              REPO_URL="https://github.com/openwrt/openwrt"
              REPO_BRANCH="main"
              TAGS_NAME="official"
          elif [[ "${{ inputs.source_branch }}" == *"lede"* ]]; then
              REPO_URL="https://github.com/coolsnowwolf/lede"
              REPO_BRANCH="master"
              TAGS_NAME="lede"
          elif [[ "${{ inputs.source_branch }}" == *"immortalwrt"* ]]; then
              REPO_URL="https://github.com/immortalwrt/immortalwrt"
              REPO_BRANCH="master"
              TAGS_NAME="immortalwrt"
          elif [[ "${{ inputs.source_branch }}" == *"Lienol"* ]]; then
              REPO_URL="https://github.com/Lienol/openwrt"
              REPO_BRANCH="master"
              TAGS_NAME="Lienol"
          else
              echo "Unknown source code repository."
              exit 1
          fi

          echo "REPO_URL: ${REPO_URL}"
          echo "REPO_BRANCH: ${REPO_BRANCH}"

          git clone -q --single-branch --depth=1 --branch=${REPO_BRANCH} ${REPO_URL} openwrt
          cd openwrt

          if [[ -n "${{ inputs.source_version }}" ]]; then
              echo "正在切换到指定版本: ${{ inputs.source_version }}"
              git fetch --unshallow --tags
              git checkout ${{ inputs.source_version }}
              if [ $? -ne 0 ]; then
                  echo "错误：切换版本失败，请检查 Tag/Commit 是否正确。"
                  exit 1
              fi
          fi
          
          CURRENT_HASH=$(git rev-parse --short HEAD)
          echo "当前源码版本 Hash: ${CURRENT_HASH}"

          cd /workdir
          ln -sf /workdir/openwrt ${GITHUB_WORKSPACE}/openwrt
          
          echo "status=success" >> ${GITHUB_OUTPUT}
          df -hT ${PWD}

      - name: 加载自定义软件源配置 (Load Feeds & DIY Part 1)
        run: |
          [[ -f "${FEEDS_CONF}" ]] && cp -f ${FEEDS_CONF} openwrt/feeds.conf.default
          
          if [[ -f "${DIY_P1_SH}" ]]; then
            chmod +x ${DIY_P1_SH}
            cd openwrt/
            echo "正在执行 diy-part1.sh..."
            ${GITHUB_WORKSPACE}/${DIY_P1_SH}
          else
            echo "警告: 未找到 diy-part1.sh，跳过此步。"
          fi

      - name: 更新 Feeds (Update Feeds)
        run: cd openwrt/ && ./scripts/feeds update -a

      - name: 安装 Feeds (Install Feeds)
        run: cd openwrt/ && ./scripts/feeds install -a

      - name: 加载固件配置 (Load Config & DIY Part 2)
        run: |
          [[ -d "files" ]] && mv -f files openwrt/files
          
          if [[ -e "${CONFIG_FILE}" ]]; then
            cp -f ${CONFIG_FILE} openwrt/.config
            echo "成功加载配置文件: ${CONFIG_FILE}"
          else
            echo "错误：未找到 .config 文件 (${CONFIG_FILE})！"
            echo "请确保你的仓库根目录下存在该文件。"
            exit 1
          fi
          
          if [[ -f "${DIY_P2_SH}" ]]; then
            chmod +x ${DIY_P2_SH}
            cd openwrt/
            echo "正在执行 diy-part2.sh..."
            ${GITHUB_WORKSPACE}/${DIY_P2_SH}
          else
            echo "警告: 未找到 diy-part2.sh，跳过此步。"
          fi

      - name: 下载源码包 (Download Packages)
        id: package
        run: |
          cd openwrt/
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件 (Compile Firmware)
        id: compile
        run: |
          cd openwrt/
          echo "使用 $(nproc) 线程进行编译..."
          make -j$(($(nproc) + 1)) V=s || make -j1 || make -j1 V=s
          
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 检查磁盘空间 (Check Space)
        if: (!cancelled())
        run: df -hT

      - name: 上传 Bin 目录 (Upload Bin Directory)
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: 整理固件文件 (Organize Files)
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 上传固件目录 (Upload Firmware)
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: ImmortalWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: 生成 Release 标签 (Generate Release Tag)
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> ${GITHUB_OUTPUT}
          touch release.txt
          echo "### OpenWrt 固件信息" >> release.txt
          echo "- 源码来源: ${{ inputs.source_branch }}" >> release.txt
          echo "- 指定版本: ${{ inputs.source_version || 'Latest' }}" >> release.txt
          echo "- 默认 IP: 192.168.1.1" >> release.txt
          echo "- 默认用户名: root" >> release.txt
          echo "- 默认密码: password (或 none)" >> release.txt
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 发布固件到 Releases (Upload to Release)
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: 清理旧的 Workflow 运行记录 (Delete Old Runs)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 2
          keep_minimum_runs: 3
