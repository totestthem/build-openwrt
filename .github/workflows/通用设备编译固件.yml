name: 通用设备编译固件
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/通用设备编译固件.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo apt update
          sudo apt -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: 下载源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git --depth=1 openwrt

      - name: 更新 feeds
        run: |
          cd openwrt
          chmod +x ../config/immortalwrt-master/diy-part1.sh
          ../config/immortalwrt-master/diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载配置
        run: |
          cd openwrt
          rm -f .config
          cp ../config/immortalwrt-master/config .config
          make defconfig

      - name: 自定义设置
        run: |
          cd openwrt
          chmod +x ../config/immortalwrt-master/diy-part2.sh
          ../config/immortalwrt-master/diy-part2.sh

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 开始编译
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-cr6606
          path: openwrt/bin/targets/ramips/mt7621/*
