name: 通用设备编译固件
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo apt update
          sudo apt -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: 下载 ImmortalWrt 源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git --depth=1 openwrt

      - name: 执行DIY Part1（克隆插件）
        run: |
          cd openwrt
          chmod +x ../config/immortalwrt-master/diy-part1.sh
          ../config/immortalwrt-master/diy-part1.sh

      - name: 更新并安装所有软件源（自动解决依赖警告）
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 安装缺失的基础依赖（彻底消除WARNING）
          ./scripts/feeds install luci luci-base bash curl luci-compat mwan3

      - name: 加载基础配置
        run: |
          cd openwrt
          cp ../config/immortalwrt-master/config .config

      - name: 执行DIY Part2（启用插件+修改设置）
        run: |
          cd openwrt
          chmod +x ../config/immortalwrt-master/diy-part2.sh
          ../config/immortalwrt-master/diy-part2.sh

      - name: 应用所有配置（强制指定CR6606设备）
        run: |
          cd openwrt
          make defconfig TARGET_PROFILE=xiaomi_mi-router-cr6606

      - name: 下载所有编译依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-CR6606
          path: openwrt/bin/targets/ramips/mt7621/*
